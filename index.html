<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartRecruit — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@500;600;700&family=Cabinet+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --c1: #0d0d1a;
            --c2: #12102a;
            --accent: #7b61ff;
            --accent2: #00e5c3;
            --accent3: #ff6b9d;
            --text: #f0eeff;
            --muted: rgba(240,238,255,0.45);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--c1);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── CANVAS BACKGROUND ── */
        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* ── AURORA ORBS ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            z-index: 0;
            pointer-events: none;
        }
        .orb-1 {
            width: 700px; height: 700px;
            background: radial-gradient(circle, #7b61ff 0%, transparent 70%);
            top: -200px; left: -150px;
            animation: orbFloat1 18s ease-in-out infinite alternate;
        }
        .orb-2 {
            width: 550px; height: 550px;
            background: radial-gradient(circle, #00e5c3 0%, transparent 70%);
            bottom: -150px; right: -100px;
            animation: orbFloat2 22s ease-in-out infinite alternate;
        }
        .orb-3 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #ff6b9d 0%, transparent 70%);
            top: 40%; left: 55%;
            opacity: 0.2;
            animation: orbFloat3 15s ease-in-out infinite alternate;
        }

        @keyframes orbFloat1 { to { transform: translate(80px, 60px) scale(1.1); } }
        @keyframes orbFloat2 { to { transform: translate(-60px, -80px) scale(1.15); } }
        @keyframes orbFloat3 { to { transform: translate(-40px, 50px) scale(0.9); } }

   
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(123,97,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(123,97,255,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 1;
            pointer-events: none;
        }


        .card-wrap {
            position: relative;
            z-index: 10;
            animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Glowing border via pseudo */
        .card-wrap::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 29px;
            background: linear-gradient(135deg, rgba(123,97,255,0.6), rgba(0,229,195,0.3), rgba(255,107,157,0.4));
            z-index: -1;
            opacity: 0.7;
            animation: borderGlow 4s ease-in-out infinite alternate;
        }

        @keyframes borderGlow {
            from { opacity: 0.5; filter: blur(0px); }
            to   { opacity: 0.9; filter: blur(1px); }
        }

        .card {
            width: 440px;
            background: rgba(18, 16, 42, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 28px;
            padding: 48px 44px 44px;
            position: relative;
            overflow: hidden;
        }


        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 20%; right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        }


        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            opacity: 0.4;
        }


        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            animation: fadeUp 0.6s 0.1s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-mark {
            position: relative;
            width: 46px; height: 46px;
        }

        .logo-mark-bg {
            position: absolute;
            inset: 0;
            border-radius: 13px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            box-shadow: 0 0 24px rgba(123,97,255,0.5), 0 0 48px rgba(123,97,255,0.2);
        }

        .logo-mark-icon {
            position: relative;
            z-index: 1;
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }

        .logo-info { line-height: 1; }
        .logo-name {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .logo-tagline {
            font-size: 11px;
            color: var(--muted);
            font-weight: 400;
            margin-top: 2px;
            letter-spacing: 0.3px;
        }

        /* ── HEADING ── */
        .heading-block {
            margin-bottom: 32px;
            animation: fadeUp 0.6s 0.15s both;
        }

        .heading-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(123,97,255,0.12);
            border: 1px solid rgba(123,97,255,0.25);
            border-radius: 20px;
            padding: 5px 12px;
            margin-bottom: 14px;
        }

        .chip-dot {
            width: 5px; height: 5px;
            background: var(--accent2);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--accent2);
            animation: chipPulse 2s infinite;
        }

        @keyframes chipPulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        .chip-text {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent2);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 800;
            color: var(--text);
            line-height: 1.15;
            letter-spacing: -0.5px;
        }

        h1 em {
            font-style: normal;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sub {
            color: var(--muted);
            font-size: 14px;
            margin-top: 6px;
            font-weight: 400;
        }

        /* ── FORM ── */
        .form-group {
            margin-bottom: 18px;
            animation: fadeUp 0.6s both;
        }
        .form-group:nth-child(1) { animation-delay: 0.2s; }
        .form-group:nth-child(2) { animation-delay: 0.25s; }

        label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 700;
            color: rgba(240,238,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .input-wrap { position: relative; }

        input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            font-size: 14.5px;
            font-family: 'Nunito', sans-serif;
            font-weight: 500;
            color: var(--text);
            outline: none;
            transition: all 0.25s;
        }

        input::placeholder { color: rgba(240,238,255,0.2); }

        input:focus {
            background: rgba(123,97,255,0.08);
            border-color: rgba(123,97,255,0.5);
            box-shadow: 0 0 0 3px rgba(123,97,255,0.12), 0 0 20px rgba(123,97,255,0.08);
        }

        .input-icon {
            position: absolute;
            left: 15px; top: 50%;
            transform: translateY(-50%);
            font-size: 17px;
            opacity: 0.3;
        }

        /* PASSWORD TOGGLE BUTTON */
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            opacity: 0.5;
            transition: opacity 0.2s;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password:hover {
            opacity: 1;
        }

        .toggle-password:focus {
            outline: none;
        }

        /* ── BUTTON ── */
        .btn-wrap {
            margin-top: 24px;
            animation: fadeUp 0.6s 0.3s both;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent), rgba(123,97,255,0.85));
            border: none;
            border-radius: 14px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 24px rgba(123,97,255,0.25), 0 0 0 1px rgba(123,97,255,0.3);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(123,97,255,0.35), 0 0 0 1px rgba(123,97,255,0.5);
        }

        .btn:hover::before { opacity: 1; }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(123,97,255,0.2);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* ── MESSAGES ── */
        .msg {
            margin-top: 16px;
            padding: 13px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            display: none;
            animation: fadeUp 0.3s both;
        }

        .msg-error {
            background: rgba(255,107,157,0.12);
            border: 1px solid rgba(255,107,157,0.3);
            color: #ff6b9d;
        }

        .msg-success {
            background: rgba(0,229,195,0.12);
            border: 1px solid rgba(0,229,195,0.3);
            color: var(--accent2);
        }

        /* ── BOTTOM LINK ── */
        .bottom {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--muted);
            animation: fadeUp 0.6s 0.35s both;
        }

        .bottom a {
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: opacity 0.2s;
        }

        .bottom a:hover { opacity: 0.8; }

        /* ── PARTICLES ── */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleFloat linear infinite;
            opacity: 0;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }

        /* Stat badges floating beside card */
        .float-badge {
            position: absolute;
            background: rgba(18,16,42,0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 5;
            animation: badgeFloat 6s ease-in-out infinite alternate;
            white-space: nowrap;
        }

        .float-badge-1 {
            top: 15%;
            right: -160px;
            animation-delay: 0s;
        }

        .float-badge-2 {
            bottom: 20%;
            right: -180px;
            animation-delay: -3s;
        }

        @keyframes badgeFloat {
            from { transform: translateY(0px); }
            to   { transform: translateY(-10px); }
        }

        .badge-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 17px;
        }
        .badge-icon-1 { background: rgba(0,229,195,0.15); }
        .badge-icon-2 { background: rgba(255,107,157,0.15); }

        .badge-info .badge-val {
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 800;
            color: var(--text);
        }
        .badge-info .badge-label {
            font-size: 11px;
            color: var(--muted);
        }

        @media (max-width: 600px) {
            .card { width: 92vw; padding: 36px 28px; }
            .float-badge { display: none; }
        }
    </style>
</head>
<body>

<!-- Background layers -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="grid-overlay"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<!-- Main card -->
<div class="card-wrap">

    <!-- Floating stat badges -->
    <div class="float-badge float-badge-1">
        <div class="badge-icon badge-icon-1">🎓</div>
        <div class="badge-info">
            <div class="badge-val">1,000+</div>
            <div class="badge-label">Students Placed</div>
        </div>
    </div>
    <div class="float-badge float-badge-2">
        <div class="badge-icon badge-icon-2">🏢</div>
        <div class="badge-info">
            <div class="badge-val">50+</div>
            <div class="badge-label">Recruiters Active</div>
        </div>
    </div>

    <div class="card">

        <!-- Logo -->
        <div class="logo">
            <div class="logo-mark">
                <div class="logo-mark-bg"></div>
                <div class="logo-mark-icon">🎯</div>
            </div>
            <div class="logo-info">
                <div class="logo-name">RecruitAi</div>
                <div class="logo-tagline">Campus Placement Portal</div>
            </div>
        </div>

        <!-- Heading -->
        <div class="heading-block">
            <div class="heading-chip">
                <div class="chip-dot"></div>
                <span class="chip-text">Secure Login</span>
            </div>
            <h1>Welcome<br><em>back.</em></h1>
            <p class="sub">Sign in to access your placement portal</p>
        </div>

        <!-- Form -->
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrap">
                    <span class="input-icon">✉️</span>
                    <input type="email" id="email" placeholder="Email" required autocomplete="email">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <span class="input-icon">🔑</span>
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                    <button type="button" class="toggle-password" id="togglePassword" title="Show/Hide password">
                        <span id="eyeIcon">👁️</span>
                    </button>
                </div>
            </div>

            <div class="btn-wrap">
                <button type="submit" class="btn" id="loginBtn">Sign In →</button>
            </div>
        </form>

        <div class="msg msg-error" id="error"></div>
        <div class="msg msg-success" id="success"></div>

        <div class="bottom">
            Don't have an account? <a href="register.html">Create one free →</a>
        </div>
    </div>
</div>

<script>
    // ── Particles ──
    const particleContainer = document.getElementById('particles');
    const colors = ['rgba(123,97,255,', 'rgba(0,229,195,', 'rgba(255,107,157,'];
    for (let i = 0; i < 28; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 5 + 2;
        const color = colors[Math.floor(Math.random() * colors.length)];
        p.style.cssText = `
            width: ${size}px; height: ${size}px;
            left: ${Math.random() * 100}%;
            background: ${color}${Math.random() * 0.6 + 0.3});
            animation-duration: ${Math.random() * 15 + 10}s;
            animation-delay: ${Math.random() * -20}s;
            box-shadow: 0 0 ${size * 2}px ${color}0.8);
        `;
        particleContainer.appendChild(p);
    }

    // ── Password Toggle ──
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');

    togglePassword.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        
        // Toggle eye icon
        eyeIcon.textContent = type === 'password' ? '👁️' : '🙈';
    });

    // ── Login ──
	const API = 'https://recruitai-pu35.onrender.com';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        const errEl = document.getElementById('error');
        const okEl = document.getElementById('success');

        btn.textContent = 'Signing in...';
        btn.disabled = true;
        errEl.style.display = 'none';
        okEl.style.display = 'none';

        try {
            const res = await fetch(`${API}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (data.success) {
                localStorage.setItem('token', data.data.token);
                localStorage.setItem('role', data.data.role);
                localStorage.setItem('userId', data.data.userId);
                localStorage.setItem('email', data.data.email);
                localStorage.setItem('name', data.data.name);

                okEl.textContent = '✓ Login successful! Redirecting...';
                okEl.style.display = 'block';

                setTimeout(() => {
                    if (data.data.role === 'STUDENT') window.location.href = 'student-dashboard.html';
                    else if (data.data.role === 'RECRUITER') window.location.href = 'recruiter-dashboard.html';
                    else if (data.data.role === 'COLLEGE') window.location.href = 'admin-dashboard.html';
                }, 1000);
            } else {
                errEl.textContent = '✗ ' + data.message;
                errEl.style.display = 'block';
                btn.textContent = 'Sign In →';
                btn.disabled = false;
            }
        } catch {
            errEl.textContent = '✗ Cannot connect to server. Is the backend running?';
            errEl.style.display = 'block';
            btn.textContent = 'Sign In →';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
